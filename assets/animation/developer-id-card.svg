<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  width="100%"
  viewBox="0 0 420 640"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Animated developer identification card for Dharmik Patel</title>

  <desc id="description">
    A professional hanging identification card with a clip, lanyard,
    portrait photograph, name, academic information, GitHub label,
    and LinkedIn label.
  </desc>

  <defs>
    <!-- Main card background -->
    <linearGradient id="cardBackground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C2635" stop-opacity="0.98"/>
      <stop offset="50%" stop-color="#161B22" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0.98"/>
    </linearGradient>

    <!-- Blue accent -->
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>

    <!-- Lanyard material -->
    <linearGradient id="lanyardGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E3D77"/>
      <stop offset="45%" stop-color="#1F6FEB"/>
      <stop offset="65%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#123A68"/>
    </linearGradient>

    <!-- Metallic clip -->
    <linearGradient id="metalGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F6FC"/>
      <stop offset="35%" stop-color="#8B949E"/>
      <stop offset="65%" stop-color="#D0D7DE"/>
      <stop offset="100%" stop-color="#57606A"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glassHighlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Photo fade -->
    <linearGradient id="photoFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="55%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-35%" y="-30%" width="170%" height="180%">
      <feDropShadow
        dx="0"
        dy="14"
        stdDeviation="13"
        flood-color="#000000"
        flood-opacity="0.55"
      />
    </filter>

    <!-- Small glow -->
    <filter id="blueGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Portrait crop -->
    <clipPath id="photoClip">
      <rect x="73" y="210" width="274" height="255" rx="16"/>
    </clipPath>

    <!-- Main card clipping -->
    <clipPath id="cardClip">
      <rect x="54" y="183" width="312" height="405" rx="25"/>
    </clipPath>
  </defs>

  <!-- Background is intentionally transparent -->

  <!-- Fixed ceiling mount -->
  <g aria-hidden="true">
    <rect
      x="177"
      y="14"
      width="66"
      height="18"
      rx="9"
      fill="#30363D"
    />

    <rect
      x="188"
      y="21"
      width="44"
      height="15"
      rx="7"
      fill="url(#metalGradient)"
    />

    <circle cx="210" cy="29" r="5" fill="#161B22"/>
  </g>

  <!-- Hanging assembly -->
  <g transform-origin="210px 29px">
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      values="-3 210 29; 2.4 210 29; -2 210 29; 3 210 29; -3 210 29"
      keyTimes="0; 0.25; 0.5; 0.75; 1"
      dur="6.8s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="
        0.42 0 0.58 1;
        0.42 0 0.58 1;
        0.42 0 0.58 1;
        0.42 0 0.58 1
      "
    />

    <!-- Lanyard straps -->
    <path
      d="M198 34 L155 139 Q153 147 161 151 L188 166"
      fill="none"
      stroke="url(#lanyardGradient)"
      stroke-width="15"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M222 34 L265 139 Q267 147 259 151 L232 166"
      fill="none"
      stroke="url(#lanyardGradient)"
      stroke-width="15"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Lanyard highlights -->
    <path
      d="M198 37 L160 139"
      fill="none"
      stroke="#79C0FF"
      stroke-opacity="0.36"
      stroke-width="3"
      stroke-linecap="round"
    />

    <path
      d="M222 37 L260 139"
      fill="none"
      stroke="#79C0FF"
      stroke-opacity="0.25"
      stroke-width="3"
      stroke-linecap="round"
    />

    <!-- Connector ring -->
    <ellipse
      cx="210"
      cy="165"
      rx="26"
      ry="14"
      fill="#0D1117"
      stroke="url(#metalGradient)"
      stroke-width="6"
    />

    <!-- Metal badge clip -->
    <g>
      <rect
        x="190"
        y="159"
        width="40"
        height="42"
        rx="10"
        fill="url(#metalGradient)"
        stroke="#F0F6FC"
        stroke-opacity="0.35"
      />

      <rect
        x="199"
        y="169"
        width="22"
        height="20"
        rx="6"
        fill="#161B22"
      />

      <rect
        x="204"
        y="189"
        width="12"
        height="13"
        rx="4"
        fill="url(#metalGradient)"
      />
    </g>

    <!-- Badge with subtle secondary movement -->
    <g transform-origin="210px 190px">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        values="0.4 210 190; -0.5 210 190; 0.4 210 190"
        keyTimes="0; 0.5; 1"
        dur="4.6s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="
          0.42 0 0.58 1;
          0.42 0 0.58 1
        "
      />

      <!-- Shadow -->
      <rect
        x="54"
        y="183"
        width="312"
        height="405"
        rx="25"
        fill="#000000"
        opacity="0.01"
        filter="url(#cardShadow)"
      />

      <!-- Card -->
      <rect
        x="54"
        y="183"
        width="312"
        height="405"
        rx="25"
        fill="url(#cardBackground)"
        stroke="#58A6FF"
        stroke-opacity="0.55"
        stroke-width="2"
      />

      <!-- Top accent -->
      <rect
        x="54"
        y="183"
        width="312"
        height="8"
        rx="4"
        fill="url(#accentGradient)"
        filter="url(#blueGlow)"
      />

      <!-- Inner border -->
      <rect
        x="64"
        y="193"
        width="292"
        height="385"
        rx="19"
        fill="none"
        stroke="#FFFFFF"
        stroke-opacity="0.08"
      />

      <!-- Portrait image -->
      <image
        href="https://raw.githubusercontent.com/dharmik-patel1511/dharmik-patel1511/main/assets/profile/dharmik-profile.png"
        x="73"
        y="210"
        width="274"
        height="255"
        preserveAspectRatio="xMidYMid slice"
        clip-path="url(#photoClip)"
      />

      <!-- Portrait frame -->
      <rect
        x="73"
        y="210"
        width="274"
        height="255"
        rx="16"
        fill="none"
        stroke="#FFFFFF"
        stroke-opacity="0.12"
      />

      <!-- Photo fade for text readability -->
      <rect
        x="73"
        y="210"
        width="274"
        height="255"
        rx="16"
        fill="url(#photoFade)"
        clip-path="url(#photoClip)"
      />

      <!-- Glass reflection -->
      <path
        d="M66 195 H250 L122 578 H66 Z"
        fill="url(#glassHighlight)"
        opacity="0.55"
        clip-path="url(#cardClip)"
      />

      <!-- Identity text -->
      <text
        x="210"
        y="497"
        text-anchor="middle"
        fill="#F0F6FC"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="0.4"
      >
        Dharmik Patel
      </text>

      <text
        x="210"
        y="525"
        text-anchor="middle"
        fill="#C9D1D9"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="14"
        font-weight="600"
        letter-spacing="0.7"
      >
        INFORMATION TECHNOLOGY
      </text>

      <text
        x="210"
        y="547"
        text-anchor="middle"
        fill="#8B949E"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="13"
        font-weight="500"
      >
        FINAL YEAR STUDENT
      </text>

      <!-- Social divider -->
      <line
        x1="82"
        y1="561"
        x2="338"
        y2="561"
        stroke="#30363D"
        stroke-width="1"
      />

      <!-- GitHub label -->
      <g transform="translate(83 570)">
        <rect
          x="0"
          y="0"
          width="112"
          height="34"
          rx="10"
          fill="#0D1117"
          stroke="#30363D"
        />

        <circle
          cx="20"
          cy="17"
          r="11"
          fill="#F0F6FC"
        />

        <text
          x="20"
          y="21"
          text-anchor="middle"
          fill="#0D1117"
          font-family="Arial, sans-serif"
          font-size="9"
          font-weight="800"
        >
          GH
        </text>

        <text
          x="39"
          y="22"
          fill="#C9D1D9"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="13"
          font-weight="600"
        >
          GitHub
        </text>
      </g>

      <!-- LinkedIn label -->
      <g transform="translate(225 570)">
        <rect
          x="0"
          y="0"
          width="112"
          height="34"
          rx="10"
          fill="#0D1117"
          stroke="#30363D"
        />

        <rect
          x="9"
          y="6"
          width="22"
          height="22"
          rx="6"
          fill="#0A66C2"
        />

        <text
          x="20"
          y="22"
          text-anchor="middle"
          fill="#FFFFFF"
          font-family="Arial, sans-serif"
          font-size="13"
          font-weight="800"
        >
          in
        </text>

        <text
          x="39"
          y="22"
          fill="#C9D1D9"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="13"
          font-weight="600"
        >
          LinkedIn
        </text>
      </g>
    </g>
  </g>
</svg>